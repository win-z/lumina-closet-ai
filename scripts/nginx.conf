server {
    listen 80;
    server_name your-domain.com;  # ← 替换为你的域名或服务器IP

    # 前端静态文件（React build 产物）
    root /www/wwwroot/lumina-closet/dist;
    index index.html;

    # 前端路由（SPA 支持，React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # COS 图片代理 (解决跨域和防盗链情况下的访问)
    location ^~ /cos-image/ {
        proxy_pass https://5205210-1320011806.cos.ap-guangzhou.myqcloud.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host 5205210-1320011806.cos.ap-guangzhou.myqcloud.com;
    }

    # 后端 API 反向代理
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;  # AI 接口耗时较长，延长超时
    }

    # 健康检查接口
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip 压缩（加速前端资源加载）
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
