name: 🚀 Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Lumina Closet AI
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ---- 前端构建 ----
      - name: 📦 Install frontend dependencies
        run: npm install

      - name: 🔨 Build frontend (Vite)
        run: npm run build

      # ---- 后端构建 ----
      - name: 📦 Install backend dependencies
        run: npm install
        working-directory: backend

      - name: 🔨 Compile backend (TypeScript)
        run: npm run build
        working-directory: backend

      # ---- 打包上传 ----
      - name: 📦 Package artifacts
        run: |
          tar -czf frontend.tar.gz dist/
          tar -czf backend.tar.gz -C backend dist/ package.json package-lock.json ecosystem.config.js

      - name: 📤 Upload packages to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "frontend.tar.gz,backend.tar.gz"
          target: "/tmp/"

      # ---- 服务器端解压 & 重启 ----
      - name: 🔄 Extract & Restart on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_DIR="/www/wwwroot/lumina-closet"

            echo "📂 解压前端..."
            tar -xzf /tmp/frontend.tar.gz -C $DEPLOY_DIR

            echo "📂 解压后端..."
            tar -xzf /tmp/backend.tar.gz -C $DEPLOY_DIR/backend

            echo "📦 安装后端生产依赖..."
            cd $DEPLOY_DIR/backend
            npm install --production --prefer-offline

            echo "🔄 重启后端服务（PM2）..."
            pm2 reload lumina-backend --update-env || pm2 start ecosystem.config.js

            echo "🧹 清理临时文件..."
            rm -f /tmp/frontend.tar.gz /tmp/backend.tar.gz

            echo "✅ 部署完成！$(date '+%Y-%m-%d %H:%M:%S')"
